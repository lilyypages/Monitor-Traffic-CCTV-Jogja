services:
  # ===== INFRASTRUCTURE =====
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: traffic-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: echo stat | nc localhost 2181
      interval: 30s
      timeout: 10s
      retries: 3

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: traffic-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 3
    healthcheck:
      test: nc -z localhost 9092 || exit 1
      interval: 30s
      timeout: 10s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: traffic-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: traffic_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U postgres
      interval: 30s
      timeout: 10s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: traffic-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    healthcheck:
      test: curl -f http://localhost:9000/minio/health/live
      interval: 30s
      timeout: 10s
      retries: 5

  # ===== COMPUTE =====
  spark-master:
    image: bitnami/spark:3.5.1
    container_name: traffic-spark-master
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "7077:7077"
    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: no
      SPARK_RPC_ENCRYPTION_ENABLED: no
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: no
      SPARK_SSL_ENABLED: no
    healthcheck:
      test: curl -f http://localhost:8080
      interval: 30s
      timeout: 10s
      retries: 5

  spark-worker-1:
    image: bitnami/spark:3.5.1
    container_name: traffic-spark-worker-1
    restart: unless-stopped
    depends_on:
      spark-master:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2

  spark-worker-2:
    image: bitnami/spark:3.5.1
    container_name: traffic-spark-worker-2
    restart: unless-stopped
    depends_on:
      spark-master:
        condition: service_healthy
    ports:
      - "8082:8081"
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2

  # ===== VISUALIZATION =====
  grafana:
    image: grafana/grafana:latest
    container_name: traffic-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    depends_on:
      - prometheus
      - loki
    healthcheck:
      test: curl -f http://localhost:3000/api/health
      interval: 30s
      timeout: 10s
      retries: 5

  metabase:
    image: metabase/metabase:latest
    container_name: traffic-metabase
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - metabase_data:/metabase.db
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: curl -f http://localhost:3000/api/health
      interval: 30s
      timeout: 10s
      retries: 5

  # ===== MONITORING =====
  prometheus:
    image: prom/prometheus:latest
    container_name: traffic-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./src/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./src/monitoring/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"

  loki:
    image: grafana/loki:latest
    container_name: traffic-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./src/monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml
      - loki_data:/loki
    command:
      - "-config.file=/etc/loki/loki-config.yml"

  # ===== ORCHESTRATION =====
  airflow-postgres:
    image: postgres:16-alpine
    container_name: traffic-airflow-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - airflow_db_data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U airflow
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-redis:
    image: redis:7-alpine
    container_name: traffic-airflow-redis
    restart: unless-stopped
    healthcheck:
      test: redis-cli ping
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-webserver:
    image: apache/airflow:2.9.1-python3.11
    container_name: traffic-airflow-webserver
    restart: unless-stopped
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-redis:
        condition: service_healthy
    ports:
      - "8085:8080"
    volumes:
      - ./src/airflow/dags:/opt/airflow/dags
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CELERY__BROKER_URL: redis://airflow-redis:6379/0
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    command: webserver

  airflow-scheduler:
    image: apache/airflow:2.9.1-python3.11
    container_name: traffic-airflow-scheduler
    restart: unless-stopped
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-redis:
        condition: service_healthy
    volumes:
      - ./src/airflow/dags:/opt/airflow/dags
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CELERY__BROKER_URL: redis://airflow-redis:6379/0
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    command: scheduler

  airflow-worker:
    image: apache/airflow:2.9.1-python3.11
    container_name: traffic-airflow-worker
    restart: unless-stopped
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-redis:
        condition: service_healthy
    volumes:
      - ./src/airflow/dags:/opt/airflow/dags
    environment:
      AIRFLOW__CORE__EXECUTOR: CeleryExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CELERY__RESULT_BACKEND: db+postgresql://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CELERY__BROKER_URL: redis://airflow-redis:6379/0
      AIRFLOW__CORE__FERNET_KEY: ""
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    command: celery worker

  # ===== APPLICATION =====
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: traffic-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./data/logs:/app/data/logs
      - ./models:/app/models
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: traffic_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      KAFKA_BROKER: kafka:29092
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  kafka-producer:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: traffic-kafka-producer
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./data/logs:/app/data/logs
    environment:
      KAFKA_BROKER: kafka:29092
    command: python -m src.kafka.producer

  alerting-service:
    image: python:3.11-slim
    container_name: traffic-alerting
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - .:/app
    working_dir: /app
    environment:
      KAFKA_BROKER: kafka:29092
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-}
    command: python -m src.alerting.telegram_bot

volumes:
  pgdata:
  minio_data:
  grafana_data:
  metabase_data:
  prometheus_data:
  loki_data:
  airflow_db_data:

networks:
  default:
    name: traffic-network
    driver: bridge
